<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Register</title>

<link rel="stylesheet"
href="style.css">

</head>

<body class="login-body">

<div class="login-box">

<img
src="https://www.smkn1suboh.sch.id/resources/images/logo.png"
class="login-logo"
>

<h2>Register</h2>

<form id="registerForm">

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button type="submit">
Register
</button>

</form>

<p class="switch-page">

Sudah punya akun?

<a href="login.html">
Login
</a>

</p>

</div>

<script type="module">

import {

auth,
createUserWithEmailAndPassword

}
from "./firebase.js";

const form =
document.getElementById(
"registerForm"
);

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert(
"Register berhasil"
);

window.location.href =
"login.html";

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
