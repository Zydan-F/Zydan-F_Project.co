<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet"
href="style.css">

</head>

<body class="login-body">

<div class="login-container">

    <div class="logo-section">

        <img src="https://www.smkn1suboh.sch.id/resources/images/logo.png">

        <h2>Buat Akun</h2>

        <p>Perpustakaan Digital</p>

    </div>

    <form id="registerForm">

        <div class="form-group">

            <input
            type="email"
            id="email"
            placeholder="Masukkan Email"
            required>

        </div>

        <div class="form-group">

            <input
            type="password"
            id="password"
            placeholder="Masukkan Password"
            required>

        </div>

        <button
        type="submit"
        class="btn-login">

            Register

        </button>

    </form>

    <div class="register-box">

        <p>Sudah punya akun?</p>

        <a href="login.html">

            Login Sekarang

        </a>

    </div>

</div>

<script type="module">

import {
auth,
createUserWithEmailAndPassword
}

from "./firebase.js";

const form =
document.getElementById(
"registerForm"
);

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Register berhasil!");

window.location.href =
"login.html";

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
