<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-box">

  <img
    src="https://www.smkn1suboh.sch.id/resources/images/logo.png"
    class="login-logo"
  >

  <h2>Perpustakaan Digital</h2>

  <form id="loginForm">

    <input
      type="email"
      id="email"
      placeholder="Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

</div>

<script type="module">

import {
  auth,
  signInWithEmailAndPassword
}
from "./firebase.js";

const form =
document.getElementById("loginForm");

form.addEventListener("submit",
async(e)=>{

  e.preventDefault();

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login berhasil");

    window.location.href =
    "index.html";

  }catch(error){

    alert(error.message);

  }

});

</script>

</body>
</html>
