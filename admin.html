<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

  <h2>Admin Panel</h2>

  <div class="menu">

    <a href="index.html">
      Dashboard
    </a>

    <a href="buku.html">
      Buku
    </a>

  </div>

</div>

<div class="content">

  <h2>Tambah Buku</h2>

  <input
    type="text"
    id="judul"
    placeholder="Judul Buku"
  >

  <input
    type="text"
    id="kategori"
    placeholder="Kategori"
  >

  <input
    type="text"
    id="gambar"
    placeholder="Link Gambar"
  >

  <input
    type="text"
    id="link"
    placeholder="Link Buku"
  >

  <button onclick="tambahBuku()">
    Tambah Buku
  </button>

</div>

<script>

function tambahBuku(){

  const data = {

    judul:
    document.getElementById(
      "judul"
    ).value,

    kategori:
    document.getElementById(
      "kategori"
    ).value,

    gambar:
    document.getElementById(
      "gambar"
    ).value,

    link:
    document.getElementById(
      "link"
    ).value

  };

  let buku = JSON.parse(
    localStorage.getItem("buku")
  ) || [];

  buku.push(data);

  localStorage.setItem(
    "buku",
    JSON.stringify(buku)
  );

  alert("Buku berhasil ditambahkan");

}

</script>

</body>
</html>
