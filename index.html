<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Perpus Digital</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo-header">

        <img src="https://www.smkn1suboh.sch.id/resources/images/logo.png">

        <div>
            <h1>Perpus Digital</h1>
            <p>SMKN 1 Suboh</p>
        </div>

    </div>

    <div class="user-profile">

        <img 
        src="https://i.pravatar.cc/150?img=12"
        class="profile-img"
        id="userAvatar">

        <h3 id="usernameUser">Memuat...</h3>

    </div>

    <div class="menu">

        <a href="index.html" class="active">
            🏠 Dashboard
        </a>

        <a href="profil.html">
            👤 Profil
        </a>

        <a href="buku.html">
            📚 Buku
        </a>

        <a href="lokasi.html">
            📍 Lokasi
        </a>

        <a href="credit.html">
            ❤️ Credit
        </a>

        <a href="#" id="logoutBtn">
            🚪 Logout
        </a>

    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="page-header">

        <h1>Dashboard</h1>

        <p>
            Selamat datang di Perpustakaan Digital
        </p>

    </div>

    <div class="dashboard-grid">

        <div class="dashboard-card">
            <h3>Total Buku</h3>
            <div class="big">245</div>
        </div>

        <div class="dashboard-card">
            <h3>Total User</h3>
            <div class="big">120</div>
        </div>

        <div class="dashboard-card">
            <h3>Kategori</h3>
            <div class="big">18</div>
        </div>

    </div>

</div>

<script type="module">

import {
auth,
onAuthStateChanged,
signOut
} from "./firebase.js";

onAuthStateChanged(auth,(user)=>{

    if(!user){

        window.location.href = "login.html";
        return;

    }

    // NAMA
    const nama =
    user.displayName ||
    "Pengguna";

    document.getElementById(
    "usernameUser"
    ).innerText = nama;

    // FOTO
    const foto =
    localStorage.getItem(
    'foto_' + user.uid
    );

    document.getElementById(
    "userAvatar"
    ).src =
    foto ||
    user.photoURL ||
    "https://i.pravatar.cc/150?img=12";

});

// LOGOUT
document.getElementById(
"logoutBtn"
).addEventListener("click",(e)=>{

    e.preventDefault();

    signOut(auth).then(()=>{

        window.location.href =
        "login.html";

    });

});

/* ==========================
ANIMASI SIDEBAR
========================== */

let lastScroll = 0;

const sidebar =
document.querySelector(".sidebar");

window.addEventListener("scroll",()=>{

    const currentScroll =
    window.pageYOffset;

    if(
        currentScroll > lastScroll &&
        currentScroll > 50
    ){

        sidebar.classList.add("hide");

    }else{

        sidebar.classList.remove("hide");

    }

    lastScroll = currentScroll;

});

</script>

</body>
</html>
