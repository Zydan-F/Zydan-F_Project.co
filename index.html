<div class="sidebar">

>

<div class="user-profile">

>

<div class="menu">

</p>

</div>

<script type="module">

import {

auth,
onAuthStateChanged,
signOut

}
from "./firebase.js";

onAuthStateChanged(
auth,
(user)=>{

if(user){

document.getElementById(
"usernameUser"
).innerText =
user.email;

}else{

window.location.href =
"login.html";

}

});

document.getElementById(
"logoutBtn"
).addEventListener(
"click",
()=>{

signOut(auth);

}
);

</script>
